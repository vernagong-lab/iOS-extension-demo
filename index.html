<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Onboarding_Extension_Tutorial_Main — Prototype Demo</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #e9eaee;
    font-family: -apple-system, "SF Pro Text", "PingFang TC", "Helvetica Neue", sans-serif;
  }
  .stage {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px 16px;
  }
  /* Fixed-size design canvas (matches the real Figma frame, 375x812) that gets
     uniformly scaled down to fit the viewport — this keeps every absolutely
     positioned child (title, steps card, animation area, button dock) perfectly
     aligned at any screen size, phone included. */
  .phone-scale-wrap {
    width: 375px;
    height: 812px;
    transform-origin: top center;
  }
  .phone {
    width: 375px;
    height: 812px;
    background: #F6F5F5; /* real fill sampled from Onboarding_Extension_Tutorial_Main */
    border-radius: 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    overflow: hidden;
    position: relative;
  }
  .status-bar {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 22px;
    font-size: 15px;
    font-weight: 600;
    color: #171717;
  }
  .status-bar .icons { font-size: 13px; letter-spacing: 1px; }
  .nav-header {
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 20px;
  }
  .nav-header .skip {
    font-size: 15px;
    color: rgba(38,38,38,0.6);
  }
  .content { padding: 0 12px; margin-top: 8px; }
  .title {
    font-size: 24px;
    font-weight: 600;
    color: rgba(38,38,38,0.85); /* real: #262626 @ 85% */
    line-height: 1.3;            /* real: 130% */
    text-align: center;
    padding: 0 12px;
    margin: 0 0 20px;
  }
  .steps-card {
    background: #ffffff;
    border-radius: 20px; /* real value read from Figma: Extension Steps instance, cornerRadius 20 (all corners) */
    padding: 4px 14px;
  }
  .step-row {
    display: flex;
    align-items: center; /* step icon vertically centered against the text */
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .step-row:last-child { border-bottom: none; }
  .step-badge {
    flex: 0 0 auto;
    width: 24px; height: 24px; /* real: "Stepper" instance is 24x24 (SF Symbol N.circle.fill) */
    border-radius: 50%;
    background: rgba(38,38,38,0.6); /* corrected per feedback: #262626 @ 60% */
    color: #fff;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .step-text {
    font-size: 14px;
    color: rgba(38,38,38,0.85); /* real */
    line-height: 1.35;
  }
  .animation-area {
    position: absolute;
    top: 391px;
    left: 0;
    width: 375px;
    height: 240px;
    background: transparent;
    overflow: hidden;
  }
  .bg-illustration {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .bg-illustration div {
    position: absolute;
    border-radius: 50%;
  }
  .bg-illustration .blob-outer {
    display: none; /* hidden layer in the real Figma file */
    left: -8.5%; top: 18.2%;
    width: 121.6%; height: 183%;
    background: radial-gradient(ellipse at center, transparent 0%, rgba(120,253,175,0.2) 89.8%, rgba(120,253,175,0.2) 100%);
  }
  .bg-illustration .blob-card {
    left: 4.8%; top: 38.3%;
    width: 94.9%; height: 142.9%;
    background: radial-gradient(ellipse at center, transparent 0%, rgba(120,253,175,0.1) 89.8%, rgba(120,253,175,0.1) 100%);
  }
  .bg-illustration .blob-inner {
    left: 17.5%; top: 57.3%;
    width: 69.6%; height: 105%;
    background: radial-gradient(ellipse at center, transparent 0%, rgba(120,253,175,0.25) 89.8%, rgba(120,253,175,0.25) 100%);
  }
  .bg-illustration .ring {
    left: 24.3%; top: 64.6%;
    width: 56.5%; height: 88.3%;
    background: rgba(31,245,121,0.8);
    filter: blur(100px);
  }
  #lottie-player {
    position: absolute;
    top: 12px; /* 12pt gap between the white steps card and the animation */
    left: 0; right: 0; bottom: 0;
  }
  .button-dock {
    position: absolute;
    bottom: 0; left: 0;
    width: 375px; height: 116px;
    padding: 12px 48px 0;
  }
  .pill-btn {
    height: 42px;
    border-radius: 21px;
    background: #0CD25F; /* real: Pill Button fill */
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 500;
  }
  .faq {
    text-align: center;
    font-size: 11px;
    color: rgba(38,38,38,0.6); /* real */
    margin-top: 18px;
  }
  .faq .tap-here { color: #0CD25F; font-weight: 500; } /* real */
</style>
</head>

  // the viewport (with side padding), so it looks right on phones too.
  function fitPhone() {
    var wrap = document.getElementById('phoneWrap');
    var available = window.innerWidth - 32; // 16px padding each side, matches .stage

    wrap.style.transform = 'scale(' + scale + ')';
    wrap.style.height = (812 * scale) + 'px';
  }
  window.addEventListener('resize', fitPhone);
  window.addEventListener('orientationchange', fitPhone);
  fitPhone();
